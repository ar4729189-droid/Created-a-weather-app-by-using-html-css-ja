<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sky Weather</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
   <link rel="stylesheet" href="index.css">
</head>

<body>
   <nav class="navbar navbar-dark bg-dark-custom">
      <div class="container">
         <span class="navbar-brand">
            <i class="fa-solid fa-cloud-sun text-warning me-2"></i>
            Sky weather-dashboard
         </span>
      </div>
   </nav>
   <div class="main-container">

      <div class="app-wrapper">
         <main class="weather-container">

            <div class="search-section">
               <input type="text" id="Input" placeholder="Search city...">
               <button id="searchbtn">Search</button>
            </div>


            <div class="weather-dashboard" id="weatherInfo">
               <div class="main-w d-flex">
                  <div class="main-display">
                     <div class="temp-box">
                        <span class="temp" id="temperature">24°C</span>
                     </div>

                     <div class="location-box">
                        <h1 class="city" id="cityName">London
                        </h1>
                        <p id="condition">Sunny</p>
                     </div>

                     <img id="weatherIcon" src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
                        class="main-sun-icon">
                  </div>


                  <div class="details-grid">

                     <div class="detail-box">
                        <i class="fa-solid fa-droplet text-primary fs-4"></i>
                        <div>
                           <strong>Humidity</strong>
                           <p id="humidity">64%</p>
                        </div>
                     </div>

                     <div class="detail-box">
                        <i class="fa-solid fa-wind text-success fs-4"></i>
                        <div>
                           <strong>Wind</strong>
                           <p id="wind">12 km/h</p>
                        </div>
                     </div>

                     <div class="detail-box">
                        <i class="fa-solid fa-temperature-arrow-down"></i>
                        <div>
                           <strong>Temperature in F</strong>
                           <p id="Fahrienheit"></p>
                        </div>
                     </div>

                     <div class="detail-box">
                        <i class="fa-solid fa-eye text-info fs-4"></i>
                        <div>
                           <strong>Current time / date</strong>
                           <p id="time"></p>
                        </div>
                     </div>

                     <div class="detail-box">
                        <i class="fa-solid fa-gauge text-warning fs-4"></i>

                        <div>
                           <strong>Pressure</strong>
                           <p id="pressure"></p>
                        </div>
                     </div>

                     <div class="detail-box">
                        <i class="fa-solid fa-cloud-sun text-secondary fs-4"></i>
                        <div>
                           <strong>Cloud</strong>
                           <p id="cloud"></p>
                        </div>
                     </div>

                  </div>
               </div>

            </div>

         </main>
      </div>

      <footer class="text-center text-white py-3">
         <p class="mb-0 small">© 2026 SkyPulse Weather</p>
      </footer>
   </div>
   <script src="index.js"></script>
</body>

</html>
